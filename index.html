<!-- #region head  -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>B&O</title>
    <link rel="preconnect"
      href="https://fonts.googleapis.com">
    <link rel="preconnect"
      href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet">
    <link
      rel="stylesheet"
      href="src/styles/main.scss"
    />
    <script
      src="src/scripts/main.js"
      defer
    ></script>
  </head>
  <!-- #endregion -->
  <body>
    <header class="header">
      <div class="header__top">
        <a href="#">
          <img class="header__logo"
            src="src/images/logo.png"
            alt="B&O Logo"
          />
        </a>

        <div class="header__icons">
          <a href="#" class="icon icon--phone"></a>
          <a href="#menu" class="icon icon--menu"></a>
        </div>
      </div>
      <div class="header__bottom">
        <h1 class="header__title">Your senses. Set free.</h1>
      </div>
    </header>

    <aside class="menu" id="menu">
      <div class="menu__top">
        <a href="#">
          <img class="menu__logo"
            src="src/images/logo.png"
            alt="B&O Logo"
          />
        </a>


        <a href="#" class="icon icon--close"></a>
      </div>
    </aside>

    <main class="main">
      <section class="recommended">
        <h2>Recommended</h2>
      </section>

      <section class="categories">
        <h2>Categories</h2>
      </section>

      <section class="about-as">
        <h2>About Us</h2>
      </section>

      <section class="contacts">
        <h2>Contact Us</h2>
      </section>
    </main>

    <footer class="footer">

    </footer>
  </body>
</html>
